# Cloud Build: build/push SoilAiInsightsWorker image and deploy private Cloud Run (pattern mirrors analytics worker).
substitutions:
  _REGION: europe-west1
  _AR_REPOSITORY: cloud-run-source-deploy
  _IMAGE_NAME: rufat-dev-gcp-ai-analysis/gcp-ai-analysis-git
  _SERVICE_NAME: gcp-ai-analysis-git
  _RUNTIME_SERVICE_ACCOUNT: 678290165816-compute
  _BQ_USERS_DATASET: crm
  _BQ_USERS_TABLE: users
  _BQ_ALERTS_DATASET: crm
  _BQ_ALERTS_TABLE: alerts
  _FIREBASE_PROJECT_ID: soil-report-a2ded

steps:
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - -f
      - Dockerfile
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPOSITORY}/${_IMAGE_NAME}:$SHORT_SHA
      - .

  - name: gcr.io/cloud-builders/docker
    args:
      - push
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPOSITORY}/${_IMAGE_NAME}:$SHORT_SHA

  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ${_SERVICE_NAME}
      - --image=${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPOSITORY}/${_IMAGE_NAME}:$SHORT_SHA
      - --region=${_REGION}
      - --platform=managed
      - --no-allow-unauthenticated
      - --service-account=${_RUNTIME_SERVICE_ACCOUNT}@$PROJECT_ID.iam.gserviceaccount.com
      - --set-env-vars=FIREBASE_PROJECT_ID=${_FIREBASE_PROJECT_ID},AI_INSIGHTS_FCM_ENABLED=true,AI_INSIGHTS_ALERT_PERSIST=true,BQ_USERS_DATASET=${_BQ_USERS_DATASET},BQ_USERS_TABLE=${_BQ_USERS_TABLE},BQ_ALERTS_DATASET=${_BQ_ALERTS_DATASET},BQ_ALERTS_TABLE=${_BQ_ALERTS_TABLE}

images:
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPOSITORY}/${_IMAGE_NAME}:$SHORT_SHA

options:
  logging: CLOUD_LOGGING_ONLY
